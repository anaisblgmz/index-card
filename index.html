<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Perks · Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep-space-blue: #1c3144;
    --granite: #596f62;
    --sage-green: #7ea16b;
    --sage-soft: #a8c098;
    --cream: #f5f1e8;
    --peach: #e8b896;
  }

  html, body {
    min-height: 100%;
    background: linear-gradient(160deg, #1c3144 0%, #2a4456 45%, #596f62 100%);
    color: var(--cream);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .font-display { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    opacity: 0.05;
    pointer-events: none;
    z-index: 1;
  }

  .wrap {
    position: relative;
    z-index: 2;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 16px;
  }
  @media (min-width: 640px) { .wrap { padding: 48px 24px; } }
  @media (min-width: 1024px) { .wrap { padding: 48px 40px; } }

  /* ---------- HEADER ---------- */
  .header { margin-bottom: 40px; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 32px; }
  .eyebrow { font-size: 10px; letter-spacing: 0.3em; color: var(--sage-soft); margin-bottom: 12px; }
  .h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(28px, 6vw, 52px); line-height: 1.1; }
  .h1 .accent { font-style: italic; color: var(--sage-soft); }

  .reset-btn {
    background: transparent; border: none; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.15em; color: var(--sage-soft); opacity: 0.6;
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .reset-btn:hover { opacity: 1; }
  .reset-btn svg { width: 12px; height: 12px; }

  .header-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }

  .cat-lineup {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 20px;
    border-radius: 16px;
    background: rgba(245, 241, 232, 0.04);
    border: 1px solid rgba(168, 192, 152, 0.15);
  }
  .cat-lineup-item { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
  @media (min-width: 640px) {
    .cat-lineup-item { flex-direction: row; text-align: left; gap: 14px; }
  }
  .cat-lineup-item .cat-svg { flex-shrink: 0; }
  .cat-name { font-family: 'Fraunces', serif; font-style: italic; font-size: 18px; color: var(--sage-soft); display: block; line-height: 1.1; }
  .cat-role { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.15em; opacity: 0.55; display: block; margin-top: 2px; }
  .cat-tagline { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.6; margin-top: 4px; display: none; }
  @media (min-width: 768px) { .cat-tagline { display: block; } }

  /* ---------- TABS ---------- */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    padding: 6px;
    border-radius: 12px;
    background: rgba(245, 241, 232, 0.04);
    border: 1px solid rgba(245, 241, 232, 0.08);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab {
    flex: 1;
    min-width: 0;
    background: transparent; border: none; cursor: pointer;
    color: var(--cream);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 12px 10px;
    border-radius: 8px;
    transition: all 0.2s;
    opacity: 0.55;
    white-space: nowrap;
  }
  @media (min-width: 640px) { .tab { font-size: 11px; padding: 14px 16px; } }
  .tab:hover { opacity: 0.85; background: rgba(245, 241, 232, 0.03); }
  .tab.active {
    opacity: 1;
    background: rgba(126, 161, 107, 0.18);
    color: var(--sage-soft);
    box-shadow: inset 0 0 0 1px rgba(168, 192, 152, 0.3);
  }
  .tab-count {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    border-radius: 999px;
    background: rgba(245, 241, 232, 0.1);
    font-size: 9px;
    letter-spacing: 0;
  }
  .tab.active .tab-count {
    background: rgba(126, 161, 107, 0.3);
    color: var(--cream);
  }

  /* ---------- STATS ---------- */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }
  @media (min-width: 640px) {
    .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
  }
  .stat {
    border-radius: 12px;
    padding: 16px;
    border: 1px solid;
    backdrop-filter: blur(8px);
  }
  @media (min-width: 640px) { .stat { padding: 20px; } }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; opacity: 0.7; margin-bottom: 8px; }
  @media (min-width: 640px) { .stat-label { font-size: 10px; } }
  .stat-value { font-family: 'Fraunces', serif; font-weight: 300; font-size: 30px; line-height: 1; }
  @media (min-width: 640px) { .stat-value { font-size: 38px; } }
  .stat-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.6; margin-top: 4px; }
  .stat-sage { border-color: rgba(126, 161, 107, 0.4); background: rgba(126, 161, 107, 0.08); }
  .stat-sage .stat-value { color: var(--sage-soft); }
  .stat-alert { border-color: rgba(232, 184, 150, 0.4); background: rgba(232, 184, 150, 0.08); }
  .stat-alert .stat-value { color: var(--peach); }
  .stat-neutral { border-color: rgba(245, 241, 232, 0.15); background: rgba(245, 241, 232, 0.03); }
  .stat-neutral .stat-value { color: var(--cream); }

  /* ---------- SECTIONS ---------- */
  .section { margin-bottom: 48px; }
  .section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .section-head h2 { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; font-size: 22px; }
  @media (min-width: 640px) { .section-head h2 { font-size: 26px; } }
  .section-head h2.sage { color: var(--sage-soft); }
  .section-head-text { flex: 1; min-width: 0; }
  .section-head-text .sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; opacity: 0.6; }
  .section-line { flex: 1; height: 1px; background: linear-gradient(to right, rgba(168, 192, 152, 0.4), transparent); }
  @media (max-width: 639px) { .section-line { display: none; } }
  .section-line-flat { flex: 1; height: 1px; background: rgba(168, 192, 152, 0.2); }

  .section-actions { display: flex; gap: 8px; }
  .small-btn {
    background: transparent;
    border: 1px solid rgba(168, 192, 152, 0.3);
    color: var(--sage-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }
  .small-btn:hover { background: rgba(126, 161, 107, 0.1); border-color: var(--sage-soft); }
  .small-btn svg { width: 12px; height: 12px; }

  /* ---------- URGENT GRID ---------- */
  .urgent-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  @media (min-width: 640px) { .urgent-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .urgent-grid { grid-template-columns: repeat(3, 1fr); } }

  .urgent-card {
    position: relative;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid rgba(168, 192, 152, 0.2);
    background: linear-gradient(135deg, rgba(245,241,232,0.04), rgba(245,241,232,0.01));
    transition: all 0.2s;
  }
  .urgent-card.is-urgent {
    border-color: rgba(232, 184, 150, 0.5);
    animation: tail-flick 2.4s infinite;
  }
  @keyframes tail-flick {
    0%, 100% { box-shadow: 0 0 0 0 rgba(126, 161, 107, 0.5); }
    50% { box-shadow: 0 0 0 8px rgba(126, 161, 107, 0); }
  }
  .urgent-card .uc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
  .uc-cardname { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; color: var(--sage-soft); }
  .uc-days {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.1em;
    padding: 2px 8px; border-radius: 999px; flex-shrink: 0;
    background: rgba(168, 192, 152, 0.1); color: var(--sage-soft);
  }
  .uc-days.is-urgent { background: rgba(232, 184, 150, 0.15); color: var(--peach); }
  .uc-body { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .uc-label { font-family: 'Fraunces', serif; font-size: 18px; line-height: 1.2; }
  .uc-detail { font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.5; opacity: 0.7; margin-bottom: 16px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .uc-cta {
    width: 100%; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em;
    padding: 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid rgba(168, 192, 152, 0.4);
    color: var(--sage-soft);
    background: rgba(126, 161, 107, 0.08);
    transition: transform 0.15s;
  }
  .uc-cta:hover { transform: scale(1.02); }

  /* ---------- EMPTY STATE ---------- */
  .empty {
    margin-bottom: 48px;
    padding: 40px 32px;
    border-radius: 16px;
    text-align: center;
    border: 1px solid rgba(126, 161, 107, 0.3);
    background: linear-gradient(135deg, rgba(126, 161, 107, 0.15), rgba(126, 161, 107, 0.03));
  }
  .empty .cat-bob { display: inline-block; margin-bottom: 12px; }
  .empty .title { font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; color: var(--sage-soft); }
  @media (min-width: 640px) { .empty .title { font-size: 26px; } }
  .empty .sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; opacity: 0.7; margin-top: 4px; }

  /* ---------- CARD PANELS ---------- */
  .cards-list { display: flex; flex-direction: column; gap: 12px; }
  @media (min-width: 640px) { .cards-list { gap: 16px; } }

  .card-panel {
    border-radius: 16px;
    border: 1px solid rgba(245, 241, 232, 0.12);
    background: linear-gradient(180deg, rgba(245,241,232,0.03), rgba(245,241,232,0.005));
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card-panel.all-claimed { border-color: rgba(126, 161, 107, 0.3); }

  .card-head {
    width: 100%;
    display: flex; align-items: center; gap: 12px;
    padding: 16px;
    background: transparent; border: none; cursor: pointer; text-align: left;
    color: inherit;
    transition: background 0.15s;
  }
  @media (min-width: 640px) { .card-head { padding: 20px 24px; gap: 16px; } }
  .card-head:hover { background: rgba(255,255,255,0.02); }

  .card-head .chip-and-cat { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .card-chip {
    width: 56px; height: 36px; border-radius: 6px;
    display: none; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  @media (min-width: 640px) { .card-chip { display: flex; } }
  .card-chip::before {
    content:''; position: absolute; inset: 0; opacity: 0.3;
    background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.1) 2px, rgba(255,255,255,0.1) 4px);
  }
  .card-chip .gold-square { width: 20px; height: 14px; border-radius: 2px; background: rgba(245, 241, 232, 0.5); position: relative; z-index: 1; }

  .card-info { flex: 1; min-width: 0; }
  .card-title-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .card-name { font-family: 'Fraunces', serif; font-size: 18px; }
  @media (min-width: 640px) { .card-name { font-size: 24px; } }
  .card-meta { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; opacity: 0.6; }
  @media (min-width: 640px) { .card-meta { font-size: 10px; } }
  .card-earnings { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.7; margin-top: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  @media (min-width: 640px) { .card-earnings { font-size: 11px; } }

  .card-right { text-align: right; flex-shrink: 0; }
  .card-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; opacity: 0.7; }
  .card-count .claimed { color: var(--cream); }
  .card-count .claimed.all { color: var(--sage-soft); }
  .card-count .total { opacity: 0.5; }
  .card-chevron { opacity: 0.6; margin-top: 4px; display: inline-flex; }

  .card-body { padding: 12px 16px 20px; border-top: 1px solid rgba(245, 241, 232, 0.08); }
  @media (min-width: 640px) { .card-body { padding: 12px 24px 24px; } }

  /* ---------- BENEFIT ROW ---------- */
  .benefit {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px;
    border-radius: 8px;
    transition: all 0.2s;
  }
  @media (min-width: 640px) { .benefit { padding: 14px; gap: 16px; } }
  .benefit.used { background: rgba(126, 161, 107, 0.08); opacity: 0.7; }

  .check-btn {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 2px solid rgba(245, 241, 232, 0.35);
    background: transparent;
    cursor: pointer;
    margin-top: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .check-btn.checked { border-color: var(--sage-green); background: var(--sage-green); }
  .check-btn svg { width: 14px; height: 14px; color: var(--deep-space-blue); animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

  .check-placeholder {
    flex-shrink: 0; width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 4px;
    opacity: 0.4;
  }
  .check-placeholder svg { width: 14px; height: 14px; }

  .benefit-cat { flex-shrink: 0; opacity: 0.9; }

  .benefit-main { flex: 1; min-width: 0; }
  .benefit-title-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .benefit-title { font-family: 'Fraunces', serif; font-size: 17px; }
  @media (min-width: 640px) { .benefit-title { font-size: 19px; } }
  .benefit-title.used { text-decoration: line-through; opacity: 0.6; }
  .benefit-value { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--sage-soft); }
  .activation-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em;
    padding: 2px 6px; border-radius: 4px;
    color: var(--peach); background: rgba(232, 184, 150, 0.15);
  }
  .benefit-detail { font-family: 'JetBrains Mono', monospace; font-size: 10px; line-height: 1.5; opacity: 0.7; margin-top: 4px; }
  @media (min-width: 640px) { .benefit-detail { font-size: 11px; } }
  .benefit-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; margin-top: 8px; display: flex; align-items: center; gap: 8px; opacity: 0.6; }
  .benefit-meta svg { width: 10px; height: 10px; }
  .benefit-claimed-note { font-family: 'JetBrains Mono', monospace; font-size: 10px; margin-top: 8px; display: flex; align-items: center; gap: 8px; color: var(--sage-soft); }
  .benefit-claimed-note svg { width: 10px; height: 10px; }
  .benefit-claimed-note .approves { font-style: italic; }

  /* ---------- FOOTER ---------- */
  footer { margin-top: 56px; padding-top: 32px; border-top: 1px solid rgba(168, 192, 152, 0.15); }
  .footer-note { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
  .footer-note .cat-svg { opacity: 0.7; flex-shrink: 0; }
  .footer-note .text {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.05em;
    opacity: 0.6; line-height: 1.6; flex: 1; padding-top: 6px;
  }
  .footer-note .text .name { color: var(--sage-soft); }

  .cat-bob { animation: purr 4s ease-in-out infinite; display: inline-block; }
  @keyframes purr { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--deep-space-blue); border: 1px solid var(--sage-soft);
    color: var(--cream); font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 12px 20px; border-radius: 8px; z-index: 100;
    opacity: 0; transition: all 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
/* ================================================================
   CAT SVGs — bigger, distinct poses, with proper markings
================================================================ */

/* ================================================================
   MINIMAL FLAT-STYLE CAT HEADS
   Inspired by mid-century flat illustration: geometric ears,
   solid blocks of color, simple eyes (oval + dot), pink triangle
   nose, single-stroke whiskers. No gradients, no shading.
================================================================ */

// GATITO — solid white cat (the simple one)
function svgGatito(size) {
  size = size || 64;
  return `<svg class="cat-svg" viewBox="0 0 120 110" width="${size}" height="${size * 0.92}" xmlns="http://www.w3.org/2000/svg">
    <!-- head shape: rounded with pointy ears built in -->
    <path d="M 20 36 L 30 12 L 44 32
             Q 60 28 76 32
             L 90 12 L 100 36
             Q 108 60 100 78
             Q 88 96 60 98
             Q 32 96 20 78
             Q 12 60 20 36 Z"
          fill="#fafaf7"/>

    <!-- inner ears -->
    <path d="M 28 22 L 32 16 L 36 24 Z" fill="#e8a8a8"/>
    <path d="M 84 24 L 88 16 L 92 22 Z" fill="#e8a8a8"/>

    <!-- closed sleepy eyes (Gatito naps) -->
    <path d="M 38 52 Q 44 56 50 52" stroke="#1c2530" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 70 52 Q 76 56 82 52" stroke="#1c2530" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- pink triangle nose -->
    <path d="M 54 64 L 66 64 L 60 72 Z" fill="#e8a8a8"/>

    <!-- mouth -->
    <path d="M 60 72 Q 56 76 52 75" stroke="#1c2530" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 60 72 Q 64 76 68 75" stroke="#1c2530" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- whiskers, single clean strokes -->
    <line x1="6" y1="66" x2="36" y2="68" stroke="#1c2530" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="74" x2="36" y2="72" stroke="#1c2530" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="114" y1="66" x2="84" y2="68" stroke="#1c2530" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="114" y1="74" x2="84" y2="72" stroke="#1c2530" stroke-width="1.5" stroke-linecap="round"/>

    <!-- floating z's (still our napper) -->
    <text x="92" y="22" font-family="Fraunces, serif" font-size="14" fill="#7ea16b" font-style="italic" opacity="0.85">z</text>
    <text x="104" y="14" font-family="Fraunces, serif" font-size="9" fill="#7ea16b" font-style="italic" opacity="0.6">z</text>
  </svg>`;
}

// LUCI — white cat with grey patch on head/ear (matches her photo)
function svgLuci(size) {
  size = size || 64;
  return `<svg class="cat-svg" viewBox="0 0 120 110" width="${size}" height="${size * 0.92}" xmlns="http://www.w3.org/2000/svg">
    <!-- white head shape -->
    <path d="M 20 36 L 30 12 L 44 32
             Q 60 28 76 32
             L 90 12 L 100 36
             Q 108 60 100 78
             Q 88 96 60 98
             Q 32 96 20 78
             Q 12 60 20 36 Z"
          fill="#fafaf7"/>

    <!-- GREY PATCH covering right ear + portion of head (mirrors photo's marking) -->
    <path d="M 76 32 L 90 12 L 100 36
             Q 102 50 90 54
             Q 78 56 74 48
             Q 72 38 76 32 Z"
          fill="#a8acb0"/>

    <!-- inner ears -->
    <path d="M 28 22 L 32 16 L 36 24 Z" fill="#e8a8a8"/>
    <path d="M 84 24 L 88 16 L 92 22 Z" fill="#e8a8a8" opacity="0.5"/>

    <!-- alert oval eyes (the Watcher is watching) -->
    <ellipse cx="44" cy="54" rx="4" ry="6" fill="#1c2530"/>

/* ================================================================
   HELPERS
================================================================ */
function getCurrentPeriod(cadence, date) {
  date = date || new Date();
  const y = date.getFullYear();
  const m = date.getMonth();
  if (cadence === 'monthly') return y + '-' + String(m+1).padStart(2,'0');
  if (cadence === 'annual') return '' + y;
  if (cadence === 'semiannual_h1') return y + '-H1';
  if (cadence === 'semiannual_h2') return y + '-H2';
  if (['q1','q2','q3','q4'].includes(cadence)) return y + '-' + cadence.toUpperCase();
  return y + '-' + String(m+1).padStart(2,'0');
}

function isBenefitActiveNow(cadence, date) {
  date = date || new Date();
  const m = date.getMonth();
  if (cadence === 'monthly' || cadence === 'annual') return true;
  if (cadence === 'semiannual_h1') return m <= 5;
  if (cadence === 'semiannual_h2') return m >= 6;
  if (cadence === 'q1') return m <= 2;
  if (cadence === 'q2') return m >= 3 && m <= 5;
  if (cadence === 'q3') return m >= 6 && m <= 8;
  if (cadence === 'q4') return m >= 9;
  return true;
}

function daysUntilExpiry(cadence, date) {
  date = date || new Date();
  const y = date.getFullYear();
  const m = date.getMonth();
  let end;
  if (cadence === 'monthly') end = new Date(y, m + 1, 0);
  else if (cadence === 'annual') end = new Date(y, 11, 31);
  else if (cadence === 'semiannual_h1') end = new Date(y, 5, 30);
  else if (cadence === 'semiannual_h2') end = new Date(y, 11, 31);
  else if (cadence === 'q1') end = new Date(y, 2, 31);
  else if (cadence === 'q2') end = new Date(y, 5, 30);
  else if (cadence === 'q3') end = new Date(y, 8, 30);
  else if (cadence === 'q4') end = new Date(y, 11, 31);
  else return 999;
  const diff = Math.ceil((end - date) / (1000 * 60 * 60 * 24));
  return Math.max(0, diff);
}

function cadenceLabel(cadence) {
  if (cadence === 'monthly') return 'Monthly';
  if (cadence === 'annual') return 'Annual';
  if (cadence === 'semiannual_h1') return 'Jan–Jun';
  if (cadence === 'semiannual_h2') return 'Jul–Dec';
  if (cadence.startsWith('q')) return cadence.toUpperCase();
  return cadence;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

const STORAGE_KEY = 'card_perks_usage_v1';
const EXPANDED_KEY = 'card_perks_expanded_v2';
const TAB_KEY = 'card_perks_tab_v1';

let usage = {};
let expandedCards = new Set(CARDS.map(c => c.id));
let activeTab = 'urgent'; // 'urgent' | 'wallet' | 'overview'

function loadState() {
  try {
    const u = localStorage.getItem(STORAGE_KEY);
    if (u) usage = JSON.parse(u);
  } catch(e) {}
  try {
    const e = localStorage.getItem(EXPANDED_KEY);
    if (e) {
      const arr = JSON.parse(e);
      if (Array.isArray(arr)) expandedCards = new Set(arr);
    }
  } catch(e) {}
  try {
    const t = localStorage.getItem(TAB_KEY);
    if (t) activeTab = t;
  } catch(e) {}
}

function saveUsage() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(usage)); } catch(e) {} }
function saveExpanded() { try { localStorage.setItem(EXPANDED_KEY, JSON.stringify(Array.from(expandedCards))); } catch(e) {} }
function saveTab() { try { localStorage.setItem(TAB_KEY, activeTab); } catch(e) {} }

function toggleBenefit(benefitId, cadence) {
  const period = getCurrentPeriod(cadence);
  const key = benefitId + '::' + period;
  if (usage[key]) delete usage[key];
  else usage[key] = { usedAt: new Date().toISOString() };
  saveUsage();
  render();
}

function toggleCardExpanded(id) {
  if (expandedCards.has(id)) expandedCards.delete(id);
  else expandedCards.add(id);
  saveExpanded();
  render();
}

function setTab(tab) {
  activeTab = tab;
  saveTab();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  if (confirm('Clear all tracked benefit usage? This cannot be undone.')) {
    usage = {};
    saveUsage();
    render();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');

  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ================================================================
   CSV EXPORT
================================================================ */
function csvEscape(v) {
  if (v == null) return '';
  const s = String(v);
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function exportCSV() {
  const headers = [
    'Card',
    'Issuer',
    'Annual Fee',
    'Benefit',
    'Detail',
    'Value (USD)',
    'Cadence',
    'Cat Guide',
    'Period',
    'Status',
    'Used At',
    'Days Until Expiry',
    'Active Now',
    'Activation Required'
  ];
  const rows = [headers.join(',')];

  CARDS.forEach(card => {
    card.benefits.forEach(b => {
      const period = getCurrentPeriod(b.cadence);
      const key = b.id + '::' + period;
      const used = !!usage[key];
      const usedAt = used ? usage[key].usedAt : '';
      const active = isBenefitActiveNow(b.cadence);
      const days = active ? daysUntilExpiry(b.cadence) : '';
      const cat = CATS[b.cat] || CATS.napper;
      const status = b.passive ? 'Passive (autopilot)' : (used ? 'Used' : (active ? 'Available' : 'Not active'));

      rows.push([
        csvEscape(card.name),
        csvEscape(card.issuer),
        csvEscape(card.annualFee),
        csvEscape(b.label),
        csvEscape(b.detail),
        csvEscape(b.value || 0),
        csvEscape(cadenceLabel(b.cadence)),
        csvEscape(cat.name),
        csvEscape(period),
        csvEscape(status),
        csvEscape(usedAt),
        csvEscape(days),
        csvEscape(active ? 'Yes' : 'No'),
        csvEscape(b.activation ? 'Yes' : 'No')
      ].join(','));
    });
  });

  const csv = rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = 'card-perks-' + stamp + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV downloaded · ' + (rows.length - 1) + ' benefits exported');
}

/* ================================================================
   COMPUTED
================================================================ */
function computeStats() {
  let claimedValue = 0, availableValue = 0, totalBenefits = 0, usedBenefits = 0;
  CARDS.forEach(card => {
    card.benefits.forEach(b => {
      if (b.passive) return;
      if (!isBenefitActiveNow(b.cadence)) return;
      totalBenefits++;
      const used = !!usage[b.id + '::' + getCurrentPeriod(b.cadence)];
      availableValue += b.value;
      if (used) { claimedValue += b.value; usedBenefits++; }
    });
  });
  return { claimedValue, availableValue, totalBenefits, usedBenefits };
}

function computeUrgent() {
  // excludes urgentExclude items (quarterly cashbacks) — they stay in Wallet only
  const list = [];
  CARDS.forEach(card => {
    card.benefits.forEach(b => {
      if (b.passive) return;
      if (b.urgentExclude) return;
      if (!isBenefitActiveNow(b.cadence)) return;
      if (usage[b.id + '::' + getCurrentPeriod(b.cadence)]) return;
      list.push({ card: card, benefit: b, days: daysUntilExpiry(b.cadence) });
    });
  });
  return list.sort((a, b) => a.days - b.days);
}

    `;
  }
  const cards = urgent.map(({ card, benefit, days }) => {
    const isUrgent = days <= 7;
    const cat = benefit.cat || 'watcher';
    const dayLabel = days === 0 ? 'TODAY' : days + 'D LEFT';
    return `
      <div class="urgent-card ${isUrgent ? 'is-urgent' : ''}">
        <div class="uc-top">
          <div class="uc-cardname">${escapeHtml(card.name.toUpperCase())}</div>
          <div class="uc-days ${isUrgent ? 'is-urgent' : ''}">${dayLabel}</div>
        </div>
        <div class="uc-body">
          ${catSVG(cat, 52)}
          <div class="uc-label">${escapeHtml(benefit.label)}</div>
        </div>
        <div class="uc-detail">${escapeHtml(benefit.detail)}</div>
        <button class="uc-cta" onclick="toggleBenefit('${benefit.id}', '${benefit.cadence}')">
          MARK AS USED 🐾
        </button>
      </div>
    `;
  }).join('');

  return `
    <section class="section">
      <div class="section-head">
        <div class="cat-bob">${catSVG('watcher', 56)}</div>
        <div class="section-head-text">
          <h2 class="sage">Luci says: use these soon</h2>
          <div class="sub">EXPIRES THIS MONTH OR HALF-YEAR</div>
        </div>
        <div class="section-line"></div>
      </div>
      <div class="urgent-grid">${cards}</div>
    </section>
  `;
}

function renderBenefitRow(benefit) {
  const period = getCurrentPeriod(benefit.cadence);
  const used = !!usage[benefit.id + '::' + period];
  const days = daysUntilExpiry(benefit.cadence);
  const isActionable = !benefit.passive;
  const cat = CATS[benefit.cat] || CATS.napper;

  const checkbox = isActionable
    ? `<button class="check-btn ${used ? 'checked' : ''}" onclick="toggleBenefit('${benefit.id}', '${benefit.cadence}')" aria-label="${used ? 'Mark as not used' : 'Mark as used'}">
         ${used ? ICONS.check : ''}
       </button>`
    : `<div class="check-placeholder">${ICONS.trending}</div>`;

  const valueBadge = benefit.value > 0 ? `<span class="benefit-value">$${benefit.value} VALUE</span>` : '';
  const activationBadge = (benefit.activation && !used) ? `<span class="activation-badge">ACTIVATE</span>` : '';

  const footerLine = used
    ? `<div class="benefit-claimed-note">${ICONS.check}<span>Claimed · <span class="approves">${cat.name} approves</span></span></div>`
    : (isActionable
        ? `<div class="benefit-meta">${ICONS.clock}<span>${cadenceLabel(benefit.cadence)} · ${days === 0 ? 'expires today' : days + ' day' + (days===1?'':'s') + ' left'}</span></div>`
        : '');

  return `
    <div class="benefit ${used ? 'used' : ''}">
      ${checkbox}
      <div class="benefit-cat">${catSVG(benefit.cat || 'napper', 44)}</div>
      <div class="benefit-main">
        <div class="benefit-title-row">
          <span class="benefit-title ${used ? 'used' : ''}">${escapeHtml(benefit.label)}</span>
          ${valueBadge}
          ${activationBadge}
        </div>
        <div class="benefit-detail">${escapeHtml(benefit.detail)}</div>
        ${footerLine}
      </div>
    </div>
  `;
}

function renderCardPanel(card) {
  const expanded = expandedCards.has(card.id);
  const activeBenefits = card.benefits.filter(b => isBenefitActiveNow(b.cadence));
  const claimable = activeBenefits.filter(b => !b.passive);
  const claimed = claimable.filter(b => usage[b.id + '::' + getCurrentPeriod(b.cadence)]).length;
  const total = claimable.length;
  const allClaimed = total > 0 && claimed === total;

  const countLabel = total > 0
    ? `<div class="card-count"><span class="claimed ${allClaimed ? 'all' : ''}">${claimed}</span><span class="total">/${total}</span> DONE</div>`
    : '';

  const bodyContent = expanded
    ? `<div class="card-body">${activeBenefits.map(renderBenefitRow).join('')}</div>`
    : '';

  return `
    <div class="card-panel ${allClaimed ? 'all-claimed' : ''}">
      <button class="card-head" onclick="toggleCardExpanded('${card.id}')">
        <div class="chip-and-cat">
          <div class="card-chip" style="background: linear-gradient(135deg, ${card.color}, ${card.color}cc);">
            <div class="gold-square"></div>
          </div>
          ${catSVG(card.cat, 56)}
        </div>
        <div class="card-info">
          <div class="card-title-row">
            <span class="card-name">${escapeHtml(card.name)}</span>
            <span class="card-meta">${escapeHtml(card.issuer.toUpperCase())} · $${card.annualFee}/YR</span>
          </div>
          <div class="card-earnings">${escapeHtml(card.earnings)}</div>
        </div>
        <div class="card-right">
          ${countLabel}
          <div class="card-chevron">${expanded ? ICONS.chevronUp : ICONS.chevronDown}</div>
        </div>
      </button>
      ${bodyContent}
    </div>
  `;
}

function renderWalletTab() {
  return `
    <section class="section">
      <div class="section-head">
        <span style="color: var(--sage-soft);">${ICONS.creditCard}</span>
        <h2>Your wallet</h2>
        <div class="section-line-flat"></div>
        <div class="section-actions">
          <button class="small-btn" onclick="exportCSV()">${ICONS.download} EXPORT CSV</button>
        </div>
      </div>
      <div class="cards-list">
        ${CARDS.map(renderCardPanel).join('')}
      </div>
    </section>
  `;
}

function renderOverviewTab(stats, urgent) {
  const totalAnnualValue = CARDS.reduce((sum, card) => {
    return sum + card.benefits.reduce((s, b) => {
      if (!b.value) return s;
      if (b.cadence === 'monthly') return s + b.value * 12;
      if (b.cadence === 'semiannual_h1' || b.cadence === 'semiannual_h2') return s + b.value;
      if (b.cadence === 'annual') return s + b.value;
      if (b.cadence.startsWith('q')) return s + b.value;
      return s;
    }, 0);
  }, 0);

  const annualFees = CARDS.reduce((s, c) => s + c.annualFee, 0);

  const cardSummary = CARDS.map(card => {
    const cardYearly = card.benefits.reduce((s, b) => {
      if (!b.value) return s;
      if (b.cadence === 'monthly') return s + b.value * 12;
      if (b.cadence === 'semiannual_h1' || b.cadence === 'semiannual_h2') return s + b.value;
      return s + b.value;
    }, 0);
    return { card, value: cardYearly };
  }).sort((a, b) => b.value - a.value);

  return `
    <section class="section">
      <div class="section-head">
        <div class="cat-bob">${catSVG('strategist', 56)}</div>
        <div class="section-head-text">
          <h2 class="sage">Loki's overview</h2>
          <div class="sub">THE LONG-GAME NUMBERS</div>
        </div>
        <div class="section-line"></div>
      </div>

      <div class="stats-grid" style="margin-bottom: 32px;">
        <div class="stat stat-sage">
          <div class="stat-label">ANNUAL CREDIT VALUE</div>
          <div class="stat-value">$${totalAnnualValue}</div>
          <div class="stat-sub">if every credit used</div>
        </div>
        <div class="stat stat-neutral">
          <div class="stat-label">TOTAL ANNUAL FEES</div>
          <div class="stat-value">$${annualFees}</div>
          <div class="stat-sub">across all cards</div>
        </div>
        <div class="stat stat-sage">
          <div class="stat-label">NET BENEFIT</div>
          <div class="stat-value">$${totalAnnualValue - annualFees}</div>
          <div class="stat-sub">credits − fees</div>
        </div>
        <div class="stat stat-neutral">
          <div class="stat-label">CARDS IN ROTATION</div>
          <div class="stat-value">${CARDS.length}</div>
          <div class="stat-sub">tracked here</div>
        </div>
      </div>

      <div style="background: rgba(245, 241, 232, 0.03); border: 1px solid rgba(245, 241, 232, 0.1); border-radius: 16px; padding: 24px;">
        <div class="font-mono" style="font-size: 10px; letter-spacing: 0.18em; opacity: 0.6; margin-bottom: 16px;">CARDS RANKED BY ANNUAL CREDIT VALUE</div>
        ${cardSummary.map(({ card, value }) => `
          <div style="display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(245, 241, 232, 0.06);">
            ${catSVG(card.cat, 36)}
            <div style="flex: 1; min-width: 0;">
              <div class="font-display" style="font-size: 17px;">${escapeHtml(card.name)}</div>
              <div class="font-mono" style="font-size: 10px; opacity: 0.6;">$${card.annualFee}/yr fee · ${card.issuer}</div>
            </div>
            <div style="text-align: right;">
              <div class="font-display" style="font-size: 22px; color: var(--sage-soft);">$${value}</div>
              <div class="font-mono" style="font-size: 9px; letter-spacing: 0.1em; opacity: 0.5;">CREDITS/YR</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div style="background: rgba(126, 161, 107, 0.06); border: 1px solid rgba(126, 161, 107, 0.2); border-radius: 16px; padding: 20px; margin-top: 24px; display: flex; gap: 16px; align-items: flex-start;">
        ${ICONS.download.replace('width="', 'style="width:20px;height:20px;color:var(--sage-soft);flex-shrink:0;margin-top:2px;" width="')}
        <div style="flex: 1;">
          <div class="font-display" style="font-style: italic; font-size: 18px; color: var(--sage-soft); margin-bottom: 4px;">Export to spreadsheet</div>
          <div class="font-mono" style="font-size: 11px; opacity: 0.7; line-height: 1.5; margin-bottom: 12px;">Download a CSV with every benefit, its value, status, and your usage history. Opens in Excel, Numbers, or Google Sheets.</div>
          <button class="small-btn" onclick="exportCSV()">${ICONS.download} DOWNLOAD CSV</button>
        </div>
      </div>
    </section>
  `;
}

function renderFooter() {
  return `
    <footer>
      <div class="footer-note">
        ${catSVG('strategist', 56)}
        <div class="text">
          <span class="name">Loki's notes:</span> Benefits data verified via web search May 2026. Always confirm current terms at issuer site. Enrollment required for Amex statement credits (Dining, Resy, Dunkin'). Chase Freedom Flex quarterly categories require activation on chase.com. Your tracker data is saved to your browser and persists across sessions.
        </div>
      </div>
    </footer>
  `;
}

function render() {
  const stats = computeStats();
  const urgent = computeUrgent();

  let body = '';
  if (activeTab === 'urgent') {
    body = renderStats(stats, urgent) + renderUrgentTab(urgent);
  } else if (activeTab === 'wallet') {
    body = renderWalletTab();
  } else if (activeTab === 'overview') {
    body = renderOverviewTab(stats, urgent);
  }

  document.getElementById('app').innerHTML = `
    <div class="wrap">
      ${renderHeader()}
      ${renderTabs()}
      ${body}
      ${renderFooter()}
    </div>
  `;
}

// boot
loadState();
render();
</script>

</body>
</html>
